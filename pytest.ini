[pytest]
pythonpath = .
testpaths = gdx_dispatch/tests
markers =
    e2e: End-to-end tests requiring live VPS and GDX_E2E_PASSWORD
    load: Load/performance tests requiring live VPS
    schema: ORM models, tenant isolation, nullable constraints
    routers: API endpoint tests (equipment, fleet, notifications, admin, etc.)
    auth: Authentication, JWT, RBAC
    billing: Invoices, payments, QuickBooks
    infra: Docker, nginx, celery, health checks
    admin: Admin operations, user management
    health: Silent-failure drift detectors (live-state manifest checks, VS Code Test Explorer dashboard). Opt-in, excluded from default suite.
    requires_pg: Integration tests that require a live PostgreSQL instance (GDX_TEST_CONTROL_DB_URL). Skipped cleanly when the PG gate is not configured.
addopts = -m "not e2e and not load and not health" -q -p no:schemathesis_xdist
; Parallelism is via pytest-split (out-of-process), not xdist. Run the
; suite with `gdx_dispatch/tools/run_tests_split.sh` (default N=7). The default
; `pytest gdx_dispatch/tests/` invocation runs serially — fine for targeted runs.
; History: switched off xdist 2026-04-24 after benchmarks showed N=7 splits
; beat -n 14 by ~17% on the 237-test slice and eliminated the
; cross-worker-fixture-race class of flaky failures.
norecursedirs = _adversarial *.egg .* _darcs build CVS dist node_modules venv {arch}
; _adversarial: vLLM-generated edge-case tests saved per-commit. Excluded from
; the main suite so baseline ratchet isn't churned; adversarial_tests.py runs
; them explicitly by path. Curate via gdx_dispatch/tools/orchestrator/adversarial_curate.py.
; Remaining entries preserve pytest's default norecursedirs (listing a single
; entry would replace the defaults).
; -p no:schemathesis_xdist disables schemathesis 4.15.1's broken xdist sub-plugin
; (pytest_testnodedown raises AttributeError on node.workeroutput — upstream bug).
; Conftest previously tried runtime deregistration; -p is load-time and reliable.
; Added 2026-04-14 after SS-5 Slice A kept hitting INTERNALERROR on teardown.
