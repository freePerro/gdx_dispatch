name: CI — Test & Build

# Least-privilege default; no job needs write access to repo contents.
permissions:
  contents: read

on:
  push:
    branches: [main]
    paths:
      - 'gdx_dispatch/**'
      - 'gdx_dispatch/docker/**'
      - '.github/workflows/**'
      - '!**/*.md'
  pull_request:
    branches: [main]

# Cancel superseded runs when a newer push lands on the same branch.
# The autonomous Claude ↔ Codex loop pushes every few minutes; without
# this, every push queues a full 10-min run even when obsolete before it
# starts. Saved 100s of Actions-minutes after we hit the 3000 limit.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Live lint/syntax gate. Preserved from the retired fast-gate.yml so the
  # ruff ratchet (.ruff_baseline) + hard F821/F823 gate survive the workflow
  # cleanup — these target the current gdx_dispatch/ tree, not the old app.
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ruff
        # Pinned: the ratchet baseline (.ruff_baseline) is version-specific —
        # a ruff bump that adds/changes rules would shift the count and
        # false-fail. Bump deliberately + re-baseline together.
        run: pip install ruff==0.15.18

      - name: Ruff full ruleset (ratchet — fails only if count increases)
        run: |
          set -e
          BASELINE=$(cat .ruff_baseline 2>/dev/null || echo 0)
          # True total from ruff's "Found N errors" summary. (The old fast-gate
          # parsed `--statistics | tail -1`, which grabbed the "N fixable" line,
          # not the total — a no-op ratchet. Fixed here.)
          CURRENT=$(ruff check gdx_dispatch/ 2>&1 | grep -oP 'Found \K\d+' || echo 0)
          CURRENT=${CURRENT:-0}
          echo "ruff: baseline=$BASELINE current=$CURRENT"
          if [ "$CURRENT" -gt "$BASELINE" ]; then
            echo "❌ Ruff violations increased ($CURRENT > $BASELINE)"
            ruff check gdx_dispatch/ --statistics | tail -20
            exit 1
          fi
          # Hard-fail on syntax / undefined-name errors regardless of baseline.
          ruff check gdx_dispatch/ --select F821,F823 --quiet

  test:
    runs-on: ubuntu-latest
    # pytest-split shard matrix. The repo deliberately disabled xdist (`-n`):
    # benchmarks (2026-04-24) showed N=7 splits beat `-n 14` by ~17% AND
    # eliminated the cross-worker-fixture-race flakiness xdist introduced
    # (see pytest.ini + gdx_dispatch/tools/run_tests_split.sh). Each shard is
    # an independent pytest process — no shared-fixture protocol between them.
    strategy:
      fail-fast: false
      matrix:
        group: [1, 2, 3, 4, 5, 6, 7]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: gdx_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        # requirements.txt pins pytest-split / pytest-asyncio (and pulls in
        # pytest). It still pins pytest-xdist too, but CI no longer uses it —
        # the split matrix below replaces the old `-n auto` invocation.
        run: pip install -r gdx_dispatch/requirements.txt

      - name: Run tests (pytest-split shard ${{ matrix.group }}/7)
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/gdx_test
          # The conftest.py guard only blocks a bare serial full-suite run;
          # split shards are the sanctioned fast path, but set the bypass
          # explicitly so the guard never trips in CI. Serial tests under
          # gdx_dispatch/tests/serial/ are included — pytest-split assigns
          # each to a shard and runs it in that shard's single process.
          PYTEST_DISABLE_SPLIT_GUARD: "1"
          # Don't write .pyc in CI — pure overhead for a throwaway runner.
          PYTHONDONTWRITEBYTECODE: "1"
        run: |
          # --forked (pytest-forked) runs each test in its own subprocess to
          # contain the #20 native SIGSEGV (an anyio/TestClient worker thread
          # racing teardown). Measured ~4x slower than in-process, but a
          # 2026-06-27 experiment (PR #60) dropping it segfaulted shard 1
          # (exit 139) — the residual crash is NOT gone, so forking stays.
          # Faster path requires fully fixing #20 (then drop --forked) or marking
          # only the crash-prone TestClient teardown tests @pytest.mark.forked.
          # The env tweaks below + --durations are kept (safe, surface slow tests).
          python -m pytest gdx_dispatch/tests/ --ignore=gdx_dispatch/tests/e2e \
            --splits 7 --group ${{ matrix.group }} --forked --tb=short -q \
            -p no:nose -p no:pastebin -p no:doctest --durations=15

  build:
    runs-on: ubuntu-latest
    needs: test
    # The image runs Alembic migrations at startup (gdx_dispatch/migrations/env.py
    # takes a `pg_advisory_xact_lock`, and baseline_squashed.sql is Postgres SQL),
    # so the boot smoke-test needs a real Postgres — SQLite can't satisfy it.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: gdx_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -f gdx_dispatch/docker/Dockerfile -t gdx-app:${{ github.sha }} .

      - name: Verify image starts
        run: |
          # --network host so the container reaches the postgres service on
          # localhost:5432. JWT_SECRET (>=32 bytes) is required at import or the
          # auth routers silently fail to load and the app comes up as a
          # ~7-route skeleton that would hide real breakage.
          # MASTER_ENCRYPTION_KEY (a Fernet key) is required at startup or the
          # app aborts ("STARTUP_ENCRYPTION_MISSING ... Application startup
          # failed"). This is a throwaway test key for a throwaway CI DB — it
          # protects nothing real.
          docker run -d --name gdx-test --network host \
            -e DATABASE_URL=postgresql://test:test@localhost:5432/gdx_test \
            -e JWT_SECRET=ci-verify-image-start-secret-at-least-32-bytes \
            -e MASTER_ENCRYPTION_KEY=nsF1JvgxTAqhkYxLo4J8k-SB2JptrgzXbPVJDUOI8w4= \
            -e SECRET_KEY=ci-test \
            gdx-app:${{ github.sha }}
          for i in $(seq 1 20); do
            curl -sf http://localhost:8000/health && { ok=1; break; }
            sleep 3
          done
          [ "${ok:-}" = 1 ] || (docker logs gdx-test && exit 1)
          docker stop gdx-test

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: gdx_dispatch/frontend/package-lock.json

      - name: Build frontend
        run: |
          cd gdx_dispatch/frontend
          npm ci --no-audit --no-fund
          npm run build

      - name: Run vitest
        run: |
          cd gdx_dispatch/frontend
          npx vitest run
