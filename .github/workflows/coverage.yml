name: Coverage

# Tracks code coverage on pushes to main and on PRs.

on:
  push:
    branches: [main, master]
    paths:
      - 'gdx_dispatch/**'
      - '.github/workflows/**'
    paths-ignore:
      - 'ai-queue/**'
      - '**/*.md'
  pull_request:
    branches: [main, master]

concurrency:
  group: coverage-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: gdx
          POSTGRES_PASSWORD: gdx_test
          POSTGRES_DB: gdx_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: archive/dispatch_flask/requirements*.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r archive/dispatch_flask/requirements.txt
          pip install pytest-cov

      - name: Run coverage
        env:
          DATABASE_URL: postgresql://gdx:gdx_test@localhost:5432/gdx_test
          REDIS_URL: redis://localhost:6379/0
          FLASK_ENV: testing
          WTF_CSRF_ENABLED: "False"
          SECRET_KEY: ci-test-secret-key-not-production
        run: |
          cd archive/dispatch_flask && python -m pytest \
            tests/production/test_01_smoke_and_render.py \
            tests/production/test_02_auth_and_session_flow.py \
            tests/production/test_05_jobs_workflow.py \
            tests/production/test_11_api_contracts_and_types.py \
            --cov=blueprints --cov=helpers --cov=db \
            --cov-report=xml:/tmp/coverage.xml \
            --cov-report=term-missing \
            -v --tb=short -p no:randomly \
            2>&1 | tee /tmp/coverage-results.txt

      - name: Upload coverage XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: /tmp/coverage.xml
          if-no-files-found: ignore
