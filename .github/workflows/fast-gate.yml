name: Fast Gate

# Runs on every PR and every push to main.
# This is the minimum quality bar — must be green before merging.
# Full overnight chain runs separately on schedule.

on:
  push:
    branches: [main, master, "feature/**", "fix/**", "phase/**"]
    paths:
      - 'gdx_dispatch/**'
      - '.github/workflows/**'
      - '!**/*.md'
  pull_request:
    branches: [main, master]

concurrency:
  group: fast-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fast-gate:
    name: Fast Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: gdx
          POSTGRES_PASSWORD: gdx_test
          POSTGRES_DB: gdx_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: archive/dispatch_flask/requirements*.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r archive/dispatch_flask/requirements.txt
          pip install ruff pre-commit

      - name: Static checks (pre-commit)
        run: |
          cd archive/dispatch_flask
          pre-commit run --all-files --config ../.pre-commit-config.yaml \
            --hook-stage manual || true
          # Run our two custom local hooks directly (pre-commit local hooks
          # need the full environment set up; do these explicitly)
          find blueprints -name "*.py" -exec python tools/check_lazy_imports.py {} +
          find templates -name "*.html" -exec python tools/check_csrf_fetch.py {} +

      - name: Ruff full ruleset (ratchet — fails only if count increases)
        run: |
          # ruff.toml defines E/W/F/I/B/S/UP/SIM. CI previously ran only
          # F821/F823, so pylance etc. showed issues in the IDE that CI
          # never enforced. This ratchet locks in the current violation
          # count as a ceiling — commits that INTRODUCE new violations
          # fail; commits that reduce or maintain pass.
          set -e
          BASELINE=$(cat .ruff_baseline 2>/dev/null || echo 0)
          CURRENT=$(ruff check gdx_dispatch/ --statistics 2>/dev/null | tail -1 | grep -oP '\d+' | head -1 || echo 0)
          CURRENT=${CURRENT:-0}
          echo "ruff: baseline=$BASELINE current=$CURRENT"
          if [ "$CURRENT" -gt "$BASELINE" ]; then
            echo "❌ Ruff violations increased ($CURRENT > $BASELINE)"
            echo "   Run: ruff check gdx_dispatch/ | head -40"
            echo "   Or:  ruff check gdx_dispatch/ --fix"
            ruff check gdx_dispatch/ --statistics | tail -20
            exit 1
          fi
          # Hard-fail on syntax errors even if baseline would allow
          ruff check gdx_dispatch/ --select F821,F823 --quiet

      - name: Ruff baseline self-heal (ratchet down if cleaner)
        run: |
          # If current count is lower than baseline, record the new floor
          # so the ceiling never drifts up. Commit is a separate PR concern
          # — this just surfaces that the baseline can be lowered.
          BASELINE=$(cat .ruff_baseline 2>/dev/null || echo 0)
          CURRENT=$(ruff check gdx_dispatch/ --statistics 2>/dev/null | tail -1 | grep -oP '\d+' | head -1 || echo 0)
          CURRENT=${CURRENT:-0}
          if [ "$CURRENT" -lt "$BASELINE" ]; then
            echo "::notice::ruff baseline can be lowered: $BASELINE → $CURRENT (update .ruff_baseline in a follow-up PR)"
          fi

      - name: Fast Gate tests
        env:
          DATABASE_URL: postgresql://gdx:gdx_test@localhost:5432/gdx_test
          REDIS_URL: redis://localhost:6379/0
          FLASK_ENV: testing
          WTF_CSRF_ENABLED: "False"
          SECRET_KEY: ci-test-secret-key-not-production
        run: |
          cd archive/dispatch_flask
          ../.venv/bin/pytest \
            tests/qwen2.5_tests/test_01_auth.py \
            tests/qwen2.5_tests/test_02_rbac.py \
            tests/qwen2.5_tests/test_03_injection.py \
            tests/qwen2.5_tests/test_05_validation.py \
            tests/production/test_01_smoke_and_render.py \
            tests/production/test_02_auth_and_session_flow.py \
            tests/production/test_03_ui_buttons_and_inputs.py \
            tests/production/test_05_jobs_workflow.py \
            tests/production/test_06_dispatch_reports_and_inbox.py \
            tests/production/test_11_api_contracts_and_types.py \
            -v --tb=short --stepwise -p no:randomly 2>&1
        continue-on-error: false

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fast-gate-results
          path: /tmp/fast_gate_results.txt
          if-no-files-found: ignore
