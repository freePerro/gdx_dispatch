name: Security Scan

permissions:
  contents: read

# Runs daily at 06:00 UTC and on every push to main / every PR targeting main.
# Fails CI if CRITICAL vulnerabilities (CVSS >= 9.0) are found.
# Also runs Bandit SAST for code-level security issues.

on:
  push:
    branches: [main, master]
    paths:
      - 'gdx_dispatch/**'
      - 'gdx_dispatch/requirements.txt'
      - '.github/workflows/**'
      - '!**/*.md'
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "0 2 * * *"   # 02:00 UTC daily

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-scan:
    name: Dependency Vulnerability Scan (pip-audit)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: gdx_dispatch/requirements.txt

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Install requirements (for pip-audit environment scan)
        # Install deps so pip-audit can scan the actual installed packages.
        run: |
          pip install -r gdx_dispatch/requirements.txt --ignore-requires-python || \
          pip install -r gdx_dispatch/requirements.txt --no-deps || true

      - name: Run pip-audit (report-only)
        # Supplementary scan. Dependabot is the authoritative dependency gate
        # (the CVSS-classifier tool was removed in the refactor); pip-audit here
        # just produces an artifact for review and never blocks CI.
        run: |
          pip-audit -f json -o /tmp/audit.json || true
          pip-audit || true

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: /tmp/audit.json
          if-no-files-found: ignore

  sast-bandit:
    name: SAST — Bandit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Bandit
        run: pip install bandit[toml]

      - name: Run Bandit (report-only)
        # -ll → medium+ severity, -q → quiet. CodeQL's Analyze (python) is the
        # authoritative SAST gate; this Bandit pass produces a report artifact
        # for review and never blocks CI.
        run: |
          bandit -r gdx_dispatch/ -ll -q -f json -o /tmp/bandit.json || true
          bandit -r gdx_dispatch/ -ll -q || true

      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: /tmp/bandit.json
          if-no-files-found: ignore
