# ─────────────────────────────────────────────────────────────────────────────
# nginx vhost for the public demo — gdxdispatch.com -> gdx-demo-app-1:8000
#
# Insert this into the LIVE nginx config on the VPS:
#   /var/www/gdx/infra/nginx.conf   (mounted into the gdx-nginx container)
#
# BEFORE adding this, REMOVE `gdxdispatch.com www.gdxdispatch.com` from the
# "Vanity domains → redirect" server block, or the two blocks collide.
#
# Then attach the proxy to the demo network so it can resolve the container:
#   docker network connect gdx-demo_default gdx-nginx
#   docker exec gdx-nginx nginx -t && docker exec gdx-nginx nginx -s reload
#
# TLS: reuses the Cloudflare origin cert (SAN *.teamgaragedoor.com). Cloudflare
# is in Full (non-strict) mode, so the SAN mismatch is not validated — exactly
# how the vanity redirect already served this host.
# ─────────────────────────────────────────────────────────────────────────────

# HTTP — ACME challenge + redirect to HTTPS
server {
    listen 80;
    server_name gdxdispatch.com www.gdxdispatch.com;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        try_files $uri =404;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — public demo app
server {
    listen 443 ssl;
    server_name gdxdispatch.com www.gdxdispatch.com;

    ssl_certificate     /etc/letsencrypt/live/teamgaragedoor.com/cf_origin.pem;
    ssl_certificate_key /etc/letsencrypt/live/teamgaragedoor.com/cf_origin.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_tickets off;

    # Scope any backend-set cookie domain to the demo host.
    proxy_cookie_domain .example.com .gdxdispatch.com;
    proxy_cookie_domain .teamgaragedoor.com .gdxdispatch.com;

    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Robots-Tag "noindex, nofollow" always;   # keep the demo out of search

    client_max_body_size 50M;
    limit_req zone=general burst=60 nodelay;

    # Marketing/landing page at the root ONLY (static, served by nginx). It
    # explains the demo + has a one-click auto-login. The SPA owns everything
    # else (/login, /dashboard, /api/*, /assets/*). The file lives on the host
    # at /var/www/gdx/landing/gdxdemo/index.html, already bind-mounted into
    # gdx-nginx as /var/www/landing/gdxdemo (no new mount needed).
    location = / {
        root /var/www/landing/gdxdemo;
        try_files /index.html =404;
        add_header Cache-Control "no-cache, must-revalidate" always;
        add_header X-Robots-Tag "noindex, nofollow" always;
    }

    # Hashed assets — cache forever.
    location /assets/ {
        resolver 127.0.0.11 valid=10s;
        set $demo_backend http://gdx-demo-app-1:8000;
        proxy_pass $demo_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options nosniff always;
    }

    # SPA + API — never cache HTML.
    location / {
        resolver 127.0.0.11 valid=10s;
        set $demo_backend http://gdx-demo-app-1:8000;
        proxy_pass $demo_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 60s;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Robots-Tag "noindex, nofollow" always;
    }
}
